<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        header {
            background-color: rgb(72, 71, 71);
            color: white;
            padding: 15px;
            text-align: center;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #a49d9d;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: rgb(72, 71, 71);
            color: white;
        }

        input {
            margin-bottom: 10px;
            margin-left: 10px;

        }

        textarea {
            /* margin-bottom: 10px; */
            margin-left: 10px;

        }

        section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        label {
            display: inline-block;
            width: 120px;
            color: rgb(38, 31, 224);
        }

        input[type="submit"],
        input[type="reset"] {
            margin-right: 10px;
            align-items: center;

        }

        sup {
            color: red;
        }

        legend {
            font-size: x-large;
        }
    </style>



</head>

<body>

    <header>
        <h1>Contact Us</h1>
    </header>

    <section>
        <form action="./success.html" method="post">


            <p>Kindly complete the contact form below, and our team will contact you shortly.</p>

            <fieldset>
                <legend>Contact Form </legend> <br>

                <label for="firstname"><sup>*</sup>FirstName :</label>
                <input type="text" required placeholder="Enter Your FirstName" id="firstname" name="firstname"> <br>

                <label for="lastname"> LastName :</label>
                <input type="text" placeholder="Enter Your Lastname" id="lastname" name="lastname"> <br>

                <label for="address"> Address :</label>
                <textarea name="address" id="address" cols="100" rows="3" maxlength="150" placeholder="Address"></textarea><br><br>

                <label for="dob">DateofBirth :</label>
                <input type="date" id="dob" name="dob"><br><br>

                <label for="Gender"> Gender :</label>
                <input type="radio" name="gender" id="">Male
                <input type="radio" name="gender" id="">Female <br><br>

                <label for="mail"><sup>*</sup>Email id :</label>
                <input type="email" required placeholder="Enter Valid Email" name="mail" id="mail"><br>

                <label for="phone"><sup>*</sup>PhoneNumber: </label>
                <input type="tel" pattern="[0-9]{10}" maxlength="10" required
                    placeholder="Vaid 10 digit mobile number" name="phone" id="phone"><br>

                <label for="comments"><sup>*</sup>Comments:</label>
                <textarea name="comment" id="comments" cols="100" rows="5" maxlength="250">Enter your comments</textarea>
                <br><br>
                <input type="submit">
                <input type="reset">


            </fieldset>
        </form>


    </section>

    <!-- ================= FOOTER ================= -->
    <footer>
        <p>© 2026 vigneshvsvn| HTML Portfolio</p>
        <p>email: vigneshvsvn@gmail.com | Phone Number: +91 9487420965</p>
    </footer>


</body>

</html>
